name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Syntax check
        run: node ./src/cli.js doctor:syntax
      - name: Tests
        run: node --test tests/*.test.js
      - name: Smoke (init + ask + doctor)
        shell: bash
        run: |
          mkdir -p /tmp/acf-smoke && cd /tmp/acf-smoke
          node "$GITHUB_WORKSPACE/src/cli.js" init
          node "$GITHUB_WORKSPACE/src/cli.js" ask "Landing para una inmobiliaria con hero y servicios"
          node "$GITHUB_WORKSPACE/src/cli.js" doctor || true
